<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลาเข้า-ออกงาน</title>
    <!-- เรียกใช้ฟอนต์ภาษาไทย Prompt จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* ตั้งค่าตัวแปรสีสำหรับธีมเท่เข้ม (Dark Mode) */
        :root {
            --bg-dark: #121212;
            --surface-dark: #1e1e24;
            --primary-color: #00e5ff; /* สีฟ้าสว่าง (Cyan) */
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --error-color: #ff4757;
            --success-color: #2ed573;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--surface-dark);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-header h2 {
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--primary-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
            background-color: rgba(0, 229, 255, 0.05);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Prompt', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 180, 219, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .status-message {
            margin-top: 20px;
            text-align: center;
            font-size: 0.95rem;
            min-height: 24px;
        }

        .loading { color: var(--primary-color); }
        .success { color: var(--success-color); }
        .error { color: var(--error-color); }
        
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h2>SYSTEM LOGIN</h2>
            <p>ระบบบันทึกเวลาเข้า-ออกงาน</p>
        </div>

        <!-- กำหนดชื่อฟอร์มให้ตรงกับข้อมูลที่เราจะดึงไปใช้ -->
        <form id="attendanceForm">
            
            <div class="form-group">
                <label for="EmployeeID">รหัสพนักงาน (จำเป็น)</label>
                <input type="text" id="EmployeeID" name="EmployeeID" placeholder="กรอกรหัสพนักงาน..." required>
            </div>

            <div class="form-group">
                <label for="FullName">ชื่อ-นามสกุล (ไม่บังคับ)</label>
                <input type="text" id="FullName" name="FullName" placeholder="กรอกชื่อของคุณ...">
            </div>

            <div class="form-group">
                <label for="Notes">หมายเหตุ</label>
                <input type="text" id="Notes" name="Notes" placeholder="ลาป่วย, สายเพราะรถติด ฯลฯ">
            </div>

            <button type="submit" id="submitBtn">บันทึกข้อมูล</button>
        </form>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        // === กรุณานำ URL ของ Google Apps Script ที่ได้จากการ Deploy Web App มาวางตรงนี้ ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywPhUcQynnCHJH7DGlZLbd7ee3g_IQkEf9rzkZ9u2wMaBF0VrD1Q0HpLlQAYC1qDVevA/exec";
        
        const form = document.getElementById('attendanceForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', e => {
            e.preventDefault(); // ป้องกันไม่ให้หน้าเว็บรีเฟรชเมื่อกด Submit

            // 1. แสดงสถานะกำลังโหลด
            submitBtn.disabled = true;
            submitBtn.innerText = "กำลังประมวลผล...";
            statusMessage.className = "status-message loading";
            statusMessage.innerText = "กำลังส่งข้อมูลเข้าระบบ โปรดรอสักครู่...";

            // 2. ดึงข้อมูลจากฟอร์ม
            let requestBody = new FormData(form);

            // 3. ส่งข้อมูลไปยัง Google Apps Script
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: requestBody 
            })
            .then(response => {
                // สมมติว่าส่งสำเร็จ
                statusMessage.className = "status-message success";
                statusMessage.innerText = "บันทึกข้อมูลสำเร็จเรียบร้อยแล้ว!";
                form.reset(); // ล้างข้อมูลในฟอร์มเตรียมรับคนต่อไป
            })
            .catch(error => {
                // กรณีเกิดข้อผิดพลาด
                console.error('Error!', error.message);
                statusMessage.className = "status-message error";
                statusMessage.innerText = "เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง";
            })
            .finally(() => {
                // คืนสถานะปุ่มกลับมาให้กดใหม่ได้
                submitBtn.disabled = false;
                submitBtn.innerText = "บันทึกข้อมูล";
                
                // ให้ข้อความหายไปหลังผ่านไป 5 วินาที
                setTimeout(() => {
                    statusMessage.innerText = "";
                }, 5000);
            });
        });
    </script>
</body>
</html>
