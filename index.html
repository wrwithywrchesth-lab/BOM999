<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลาเข้า-ออกงาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #121212;
            --surface-dark: #1e1e24;
            --primary-color: #00e5ff; 
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --error-color: #ff4757;
            --success-color: #2ed573;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--surface-dark);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header { text-align: center; margin-bottom: 30px; }

        .card-header h2 {
            font-weight: 600;
            font-size: 1.5rem;
            color: var(--primary-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
            background-color: rgba(0, 229, 255, 0.05);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Prompt', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 180, 219, 0.4);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status-message {
            margin-top: 20px;
            text-align: center;
            font-size: 0.95rem;
            min-height: 24px;
            font-weight: 500;
        }

        .loading { color: var(--primary-color); }
        .success { color: var(--success-color); }
        .error { color: var(--error-color); }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h2>SYSTEM LOGIN</h2>
            <p>ระบบบันทึกเวลาเข้า-ออกงาน</p>
        </div>

        <form id="attendanceForm">
            <div class="form-group">
                <label for="EmployeeID">รหัสพนักงาน (จำเป็น)</label>
                <input type="text" id="EmployeeID" name="EmployeeID" placeholder="กรอกรหัสพนักงาน..." required>
            </div>

            <div class="form-group">
                <label for="FullName">ชื่อ-นามสกุล (ไม่บังคับ)</label>
                <input type="text" id="FullName" name="FullName" placeholder="กรอกชื่อของคุณ...">
            </div>

            <div class="form-group">
                <label for="Notes">หมายเหตุ</label>
                <input type="text" id="Notes" name="Notes" placeholder="ลาป่วย, สายเพราะรถติด ฯลฯ">
            </div>

            <button type="submit" id="submitBtn">บันทึกข้อมูล</button>
        </form>

        <div id="statusMessage" class="status-message"></div>
    </div>

    <script>
        // === วาง URL ของ Google Apps Script ที่ Deploy เป็น "เวอร์ชันใหม่" ลงในช่องนี้ ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFYmUkuvYPMpUiIXt2PjXea9Tjd5z6ByiZ6gfYCyKFk6X91HaJxR7-8eXetfW6P6Ipcw/exec";
        
        const form = document.getElementById('attendanceForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', e => {
            e.preventDefault(); 

            // เปลี่ยนสถานะปุ่มเป็นกำลังโหลด
            submitBtn.disabled = true;
            submitBtn.innerText = "กำลังประมวลผล...";
            statusMessage.className = "status-message loading";
            statusMessage.innerText = "กำลังเชื่อมต่อกับฐานข้อมูล...";

            // ใช้ FormData แบบพื้นฐาน ซึ่ง Google Apps Script สามารถอ่านได้แน่นอน
            const requestBody = new FormData(form);

            // ส่งข้อมูลไปยัง SCRIPT_URL
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: requestBody 
            })
            .then(response => {
                // ถ้าได้รับการตอบสนองกลับมา ถือว่าข้อมูลส่งถึงเซิร์ฟเวอร์แล้ว
                statusMessage.className = "status-message success";
                statusMessage.innerText = "บันทึกข้อมูลเข้า Sheet เรียบร้อยแล้ว!";
                form.reset(); 
            })
            .catch(error => {
                console.error('Error:', error);
                statusMessage.className = "status-message error";
                statusMessage.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่";
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerText = "บันทึกข้อมูล";
                
                setTimeout(() => {
                    statusMessage.innerText = "";
                }, 5000);
            });
        });
    </script>
</body>
</html>
